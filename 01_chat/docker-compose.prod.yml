services:
  api:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      AI_CHAT_ENV: production
      AI_CHAT_DATABASE__URL: ${AI_CHAT_DATABASE__URL}
      AI_CHAT_JWT__SECRET: ${AI_CHAT_JWT__SECRET}
      AI_CHAT_LLM__PROVIDER: ${AI_CHAT_LLM__PROVIDER:-mock}
      AI_CHAT_LLM__MODEL: ${AI_CHAT_LLM__MODEL:-gpt-4o-mini}
      AI_CHAT_LLM__API_BASE_URL: ${AI_CHAT_LLM__API_BASE_URL:-}
      AI_CHAT_LLM__API_KEY: ${AI_CHAT_LLM__API_KEY:-}
      AI_CHAT_LLM__TIMEOUT_SECONDS: ${AI_CHAT_LLM__TIMEOUT_SECONDS:-10}
      AI_CHAT_LLM__MAX_RETRIES: ${AI_CHAT_LLM__MAX_RETRIES:-1}
      AI_CHAT_LOG_LEVEL: ${AI_CHAT_LOG_LEVEL:-INFO}
      AI_CHAT_MAX_REQUEST_BODY_BYTES: ${AI_CHAT_MAX_REQUEST_BODY_BYTES:-16384}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${AI_CHAT_PORT:-8000}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_chat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
