services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_CHAT_ENV: development
      AI_CHAT_DATABASE__URL: ${AI_CHAT_DATABASE__URL}
      AI_CHAT_JWT__SECRET: ${AI_CHAT_JWT__SECRET}
      AI_CHAT_LLM__PROVIDER: ${AI_CHAT_LLM__PROVIDER:-mock}
      AI_CHAT_LLM__API_BASE_URL: ${AI_CHAT_LLM__API_BASE_URL:-}
      AI_CHAT_LLM__API_KEY: ${AI_CHAT_LLM__API_KEY:-}
      AI_CHAT_LLM__MODEL: ${AI_CHAT_LLM__MODEL:-gpt-4o-mini}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_chat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
