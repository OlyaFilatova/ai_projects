worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    limit_conn_zone $binary_remote_addr zone=per_ip_connections:10m;
    limit_req_zone $binary_remote_addr zone=per_ip_requests:10m rate=30r/m;

    upstream ai_chat_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 16k;

        location / {
            proxy_pass http://ai_chat_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 5s;
            proxy_buffering off;
            proxy_request_buffering on;
            proxy_set_header Connection "";
            limit_conn per_ip_connections 20;
            limit_req zone=per_ip_requests burst=20 nodelay;
        }
    }
}
